<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#060810">
  <title>OMEGA-EXTENSION: Reality Hacking</title>
  <style>
    :root {
      --bg: #060810;
      --surface: #0b0f1a;
      --gold: #c8a84b;
      --cyan: #00d4ff;
      --text: #b8c4d8;
      --text-secondary: #8a94a6;
      --glass: rgba(11, 15, 26, 0.7);
      --glass-border: rgba(200, 168, 75, 0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: manipulation;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      width: min(96vw, 480px);
      margin: 0 auto;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      position: relative;
      overflow: hidden;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      position: relative;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 8px rgba(200, 168, 75, 0.5);
    }

    .tab-switcher {
      display: flex;
      gap: 0.5rem;
      background: rgba(11, 15, 26, 0.5);
      border-radius: 12px;
      padding: 0.25rem;
    }

    .tab {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s;
      min-width: 80px;
      text-align: center;
    }

    .tab.active {
      background: var(--gold);
      color: #060810;
    }

    .tab:not(.active) {
      color: var(--text-secondary);
    }

    .feature-panel {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .feature-panel.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .feature-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--gold);
      text-align: center;
    }

    .feature-description {
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 1.5rem;
      color: var(--text-secondary);
      text-align: center;
    }

    .media-upload {
      width: 100%;
      height: 200px;
      border: 2px dashed var(--glass-border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(11, 15, 26, 0.3);
      position: relative;
      overflow: hidden;
    }

    .media-upload:hover {
      border-color: var(--gold);
    }

    .media-upload input {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      opacity: 0;
      cursor: pointer;
    }

    .media-preview {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    .media-icon {
      font-size: 2rem;
      color: var(--cyan);
    }

    .media-text {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .action-button {
      width: 100%;
      padding: 1rem;
      background: var(--gold);
      color: #060810;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 1rem;
    }

    .action-button:hover {
      background: #d4b55a;
      transform: translateY(-2px);
    }

    .action-button:active {
      transform: translateY(0);
    }

    .action-button:disabled {
      background: #4a5568;
      cursor: not-allowed;
      transform: none;
    }

    .result-container {
      margin-top: 2rem;
      padding: 1rem;
      background: rgba(11, 15, 26, 0.5);
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      display: none;
    }

    .result-container.active {
      display: block;
    }

    .result-image {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 1rem;
    }

    .result-text {
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--text);
    }

    .ethics-meter {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .meter-label {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .meter-value {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--cyan);
    }

    .identity-slider {
      width: 100%;
      margin-top: 1rem;
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .slider {
      flex: 1;
      height: 4px;
      background: var(--glass-border);
      border-radius: 2px;
      outline: none;
      -webkit-appearance: none;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
      border: 2px solid var(--bg);
    }

    .slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
      border: 2px solid var(--bg);
    }

    .slider-value {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--cyan);
      min-width: 24px;
      text-align: right;
    }

    .collective-controls {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1rem;
    }

    .participant-count {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem;
      background: rgba(11, 15, 26, 0.5);
      border-radius: 8px;
      font-size: 0.9rem;
    }

      justify-content: space-between;
      align-items: center;
      padding: 0.75rem;
      background: rgba(11, 15
